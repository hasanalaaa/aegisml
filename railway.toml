[build]
builder = "nixpacks"
buildCommand = "pip install -r services/scan-engine/requirements.txt"

[deploy]
startCommand = "cd services/scan-engine && uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[environments.production.variables]
ENVIRONMENT = "production"
